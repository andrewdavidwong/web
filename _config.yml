# Site settings
title: Andrew David Wong
description: > # this means to ignore newlines until "baseurl:"
  Andrew David Wong is the CEO of Invisible Things Lab and the Community Manager
  of the Qubes OS Project.
url: "https://andrewdavidwong.com"

# Project Settings
repository: "andrewdwong/andrewdavidwong.com"
project_repo_path: "https://github.com/andrewdwong"
project_repo_site: "/andrewdavidwong.com"

# Build settings
markdown: kramdown
highlighter: rouge
timezone: UTC
encoding: utf-8
relative_permalinks: false
permalink: pretty
excerpt_separator: ""
sass:
  style: compressed
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  blanklines: false
  startings: [html, head, body]
gems:
  - jekyll-redirect-from
  - jekyll-sitemap
